<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - ちとせメタバースデザイン</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">ホーム</a>
            <a href="about.html">私たちの想い</a>
            <a href="services.html">サービス</a>
            <a href="portfolio.html">実績事例</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>
    </header>

    <main>
        <section id="contact-hero">
            <h1>お問い合わせ・無料相談</h1>
            <p>リノベーションの第一歩、まずは「ちとせメタバースデザイン」にご相談ください。</p>
        </section>

        <section class="content-section contact-form-section">
            <h2>無料相談フォーム</h2>
            <p>下記のフォームにご記入の上、送信してください。後日、担当者よりご連絡させていただきます。</p>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">お名前 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">電話番号</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="subject">件名 <span class="required">*</span></label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                <button type="submit" class="button">送信する</button>
            </form>
        </section>

        <section class="cta-section">
            <h2>お電話でのお問い合わせも歓迎です</h2>
            <p>ご不明な点や緊急のご相談は、お電話でもお気軽にお問い合わせください。</p>
            <p><strong>電話番号: XXX-XXXX-XXXX</strong></p>
            <p>受付時間: 平日 9:00 - 18:00</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 ちとせメタバースデザイン All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
